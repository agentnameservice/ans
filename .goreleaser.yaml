# GoReleaser config for the four ans binaries:
#   ans-ra      — Registration Authority server
#   ans-tl      — Transparency Log server
#   ans-verify  — offline verifier
#   ans-dns     — development DNS server
#
# All four are pure Go (modernc.org/sqlite is a Go transpilation of
# upstream SQLite, so the SQLite-backed RA and TL no longer need CGO),
# which means the same goos/goarch matrix applies uniformly: linux,
# darwin, and windows on amd64 and arm64.
#
# Library consumers continue to use `go get` / module versions — only
# the binaries are packaged here.
# Docs: https://goreleaser.com/customization/
version: 2

project_name: ans

before:
  hooks:
    - go mod tidy

# ldflags target `main.version` etc. to match how the Makefile
# (-X main.version=...) and the cmd/*/main.go vars are wired.
# ans-ra and ans-tl actually consume these vars; ans-verify and
# ans-dns don't declare them today and the linker silently ignores
# unmatched -X targets, which keeps the build matrix uniform.
builds:
  - id: ans-ra
    main: ./cmd/ans-ra
    binary: ans-ra
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-tl
    main: ./cmd/ans-tl
    binary: ans-tl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-verify
    main: ./cmd/ans-verify
    binary: ans-verify
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-dns
    main: ./cmd/ans-dns
    binary: ans-dns
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# One archive per (goos, goarch), each containing all four binaries.
archives:
  - id: ans
    ids:
      - ans-ra
      - ans-tl
      - ans-verify
      - ans-dns
    name_template: "ans_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# release-please owns the changelog and the GitHub Release body.
# GoReleaser only attaches binaries + checksums to the existing release.
changelog:
  disable: true

release:
  mode: append
  github:
    owner: godaddy
    name: ans
