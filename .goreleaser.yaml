# GoReleaser config for the four ans binaries:
#   ans-ra      — Registration Authority server
#   ans-tl      — Transparency Log server
#   ans-verify  — offline verifier
#   ans-dns     — development DNS server
#
# All four are pure Go (modernc.org/sqlite is a Go transpilation of
# upstream SQLite, so the SQLite-backed RA and TL don't need CGO).
# The release matrix is linux + darwin × amd64 + arm64.
#
# Why no windows: ans-tl depends on github.com/transparency-dev/tessera's
# storage/posix backend, which calls FcntlFlock / O_DIRECTORY / Flock_t
# / F_WRLCK / F_SETLKW. These are POSIX file-locking primitives and are
# undefined in Go's syscall_windows.go (Windows uses LockFileEx and a
# different file-system semantics). darwin works because macOS is
# POSIX-compliant; windows is not. Rather than ship a heterogeneous
# archive set (no ans-tl on windows; the other three are buildable),
# we drop windows entirely. Windows users who need to run any of the
# binaries can do so via the Dockerfile.* images under WSL2 or Docker
# Desktop, where the underlying filesystem is POSIX.
#
# Library consumers continue to use `go get` / module versions — only
# the binaries are packaged here.
# Docs: https://goreleaser.com/customization/
version: 2

project_name: ans

before:
  hooks:
    - go mod tidy

# ldflags target `main.version` etc. to match how the Makefile
# (-X main.version=...) and the cmd/*/main.go vars are wired.
# ans-ra and ans-tl actually consume these vars; ans-verify and
# ans-dns don't declare them today and the linker silently ignores
# unmatched -X targets, which keeps the build matrix uniform.
builds:
  - id: ans-ra
    main: ./cmd/ans-ra
    binary: ans-ra
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-tl
    main: ./cmd/ans-tl
    binary: ans-tl
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-verify
    main: ./cmd/ans-verify
    binary: ans-verify
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

  - id: ans-dns
    main: ./cmd/ans-dns
    binary: ans-dns
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# One archive per (goos, goarch), each containing all four binaries.
archives:
  - id: ans
    ids:
      - ans-ra
      - ans-tl
      - ans-verify
      - ans-dns
    name_template: "ans_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# release-please owns the changelog and the GitHub Release body.
# GoReleaser only attaches binaries + checksums to the existing release.
changelog:
  disable: true

release:
  mode: append
  # owner/name are intentionally omitted: GoReleaser infers them from the CI
  # environment / git remote, so releases keep working across org renames and
  # transfers. The hardcoded `github.owner: godaddy` is what broke the v0.1.6
  # release after the repo moved to the agentnameservice org (asset uploads to
  # the old owner path got 307 redirects GoReleaser cannot follow).
