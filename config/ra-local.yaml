server:
  host: "0.0.0.0"
  port: 18080

auth:
  type: static
  static:
    api-key: "ans-dev-key-change-me"

ca:
  type: self
  self:
    org: "ANS Local Dev CA"
    validity-days: 365
    data-dir: "./data/ra/ca"
  # server: optional server certificate issuer. When omitted the RA
  # accepts only BYOC server certs (serverCertificatePEM). Two
  # adapter types implement the same order lifecycle:
  #
  # In-process self-signed CA (type self, the default):
  # server:
  #   type: self
  #   org: "ANS Local Dev Server CA"
  #   validity-days: 365
  #   data-dir: "./data/ra/server-ca"
  #
  # External RFC 8555 CA — Let's Encrypt et al. (type acme). Use the
  # staging directory for testing; production rate limits are
  # unforgiving. Selecting this type auto-accepts the provider's
  # terms of service on account registration. The relayed challenges
  # in pending responses become the provider's own (token + key
  # authorization + computed DNS digest) — the domain owner publishes
  # them, exactly as with the self-signed issuer.
  #
  # REQUIRES dns.type: lookup (below). With a real public CA the
  # verify-acme gate must check the owner's published artifact before
  # answering the provider; the noop verifier would answer blindly and
  # invalidate every order, so config validation rejects acme + noop.
  # server:
  #   type: acme
  #   acme:
  #     directory-url: "https://acme-staging-v02.api.letsencrypt.org/directory"
  #     email: "ops@example.com"
  #     data-dir: "./data/ra/acme"

dns:
  # "noop" (default) accepts any DNS state — the quickstart demo uses
  # it so registrations succeed without a real nameserver. Flip to
  # "lookup" to query a real nameserver via miekg/dns, and set
  # `dns.server` to point at the bundled `ans-dns` dev server (or
  # any authoritative nameserver). When the resolver sets the AD
  # bit on TLSA responses, the RA surfaces DNSSECVerified=true on
  # the resulting TL attestation.
  type: noop
  # server: "127.0.0.1:15353"

identity:
  # Verified identities — the "who" behind agents, proven through a
  # challenge-bound key proof and sealed on their own TL stream.
  # The did:web resolver mirrors the DNS verifier's noop/real split:
  #   "noop" — no I/O; the DID document is synthesized from the keys
  #            embedded in the submitted proofs' `jwk` headers.
  #            Signature verification still genuinely runs; only the
  #            "does the live did.json list this key" binding is
  #            waived. Quickstart only — NOT for production.
  #   "web"  — hardened HTTPS fetch of the DID document: WebPKI
  #            validation, SSRF dialer guards, 5s timeout, bounded
  #            same-site redirects.
  # did:key identities never resolve anything — the key decodes from
  # the identifier itself, so they work fully in both modes.
  resolver:
    type: noop
  # challenge-ttl bounds the verify-control nonce (default 1h; 5m is
  # the recommended floor for high-assurance deployments).
  challenge-ttl: 1h
  # register-rate-limit caps per-owner register/rotate calls per
  # minute (each can trigger an outbound did:web fetch).
  register-rate-limit: 10

vlei:
  # The lei (vLEI) control verifier behind the `lei` identifier kind,
  # mirroring the DNS verifier's and did:web resolver's noop/real split:
  #   "noop"     — no I/O; accepts the same CESR presentation payload but
  #                performs structural qb64 checks only and waives the
  #                vlei-verifier authorization + cryptographic signature checks
  #                (zero-infra quickstart only — NOT for production).
  #   "verifier" — a hardened HTTP client for an internal GLEIF
  #                vlei-verifier (present / authorize / verify). The RA
  #                never parses KERI key state itself; the verifier is
  #                the authoritative key-state oracle. REQUIRED for the
  #                real end-to-end flow that scripts/demo/vlei/up.sh
  #                brings up (keria, vlei-server, vlei-verifier,
  #                witnesses, signify).
  type: noop
  # base-url: required when type is "verifier" — the internal
  # vlei-verifier service URL.
  # base-url: "http://localhost:7676"
  # present-timeout bounds each verifier HTTP request (default 5s).
  # present-timeout: 5s

keys:
  type: file
  file:
    path: "./data/ra/keys"

store:
  type: sqlite
  sqlite:
    path: "./data/ra/ans.db"

tl-client:
  base-url: "http://localhost:18081"
  # public-base-url: the externally-reachable TL URL used in _ans-badge
  # DNS TXT records. Required — must be an https:// URL.
  public-base-url: "https://localhost:18081"
  api-key: "tl-internal-key"
  timeout: 10s

# signer: names the KeyManager key + RA identifier used to produce the
# detached-JWS the TL will verify on ingest. The keyId is auto-created
# on first run; the TL operator must register the matching public key
# under producerKeys[] in tl-local.yaml (use `keymanager` tooling to
# export the .pub file once ans-ra has started).
signer:
  keyId: "ans-ra-signer"
  raId: "ans-ra-local"

log:
  level: info
  format: text
